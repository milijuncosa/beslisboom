<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beslisboom Interactief - Topdesk</title>
<script src="lib/pdf.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
</script>
<style>
body { margin:0; font-family:Arial, sans-serif; text-align:center; }

.pdf-container {
  position: relative;
  width: 100%;
  max-width: 800px;
  aspect-ratio: 4/5; /* vaste verhouding 800x1000 */
  margin: 0 auto;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  z-index: 1;
  position: relative;
}

.svg-overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:10;
  pointer-events: none; /* standaard geen interactie behalve voor rects */
}

.svg-overlay rect {
  fill: transparent; /* volledig onzichtbaar */
  cursor: pointer;
  pointer-events: all; /* rects zijn klikbaar */
}
</style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>
  <svg class="svg-overlay" id="svg-overlay"></svg>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');
const svgOverlay = document.getElementById('svg-overlay');

// Definieer 2 knoppen: linksboven en rechtsboven
const buttons = [
  {
    // Links bovenin
    x: 50,  // 50px vanaf links (op een 800px breed canvas)
    y: 50,  // 50px vanaf boven (op een 1000px hoog canvas)
    width: 150,
    height: 50,
    url: 'https://example.com/standaard-change'
  },
  {
    // Rechts bovenin
    x: 600, // 800-150-50 = 600
    y: 50,
    width: 150,
    height: 50,
    url: 'https://example.com/niet-standaard-change'
  }
];

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf=>{
  pdf.getPage(1).then(page=>{
    const viewport = page.getViewport({scale:1.0});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const context = canvas.getContext('2d');
    page.render({canvasContext:context, viewport:viewport}).promise.then(()=>{
      drawSVGButtons();
    });
  });
});

// Plaats de knoppen bovenin, in percentages
function drawSVGButtons() {
  const cw = svgOverlay.clientWidth;
  const ch = svgOverlay.clientHeight;
  svgOverlay.innerHTML = ''; // oude rects verwijderen

  buttons.forEach(b => {
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute('x', (b.x/800*100) + '%');
    rect.setAttribute('y', (b.y/1000*100) + '%');
    rect.setAttribute('width', (b.width/800*100) + '%');
    rect.setAttribute('height', (b.height/1000*100) + '%');
    rect.addEventListener('click', ()=>window.open(b.url,'_blank'));
    svgOverlay.appendChild(rect);
  });
}

// Herpositioneer bij resize
window.addEventListener('resize', drawSVGButtons);

</script>

</body>
</html>
