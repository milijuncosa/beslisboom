<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beslisboom Interactief</title>
<script src="lib/pdf.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
</script>
<style>
body { margin:0; font-family:Arial, sans-serif; text-align:center; }

.pdf-container {
  position: relative;
  width: 100%;
  max-width: 800px; /* optioneel */
  margin: 0 auto;
}

canvas {
  display: block;
  width: 100%;
  height: auto; /* behoudt verhoudingen */
}

/* Klikbare overlay */
.pdf-overlay-link {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  cursor: pointer;
  text-decoration: none; /* geen onderstreping */
}
</style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>
  <!-- Eén grote klikbare overlay -->
  <a href="https://saxion.sharepoint.com/:b:/t/o365-team000217/IQAwP6X1egGaRIPRbY_tyNjCAVxeiG7Xt4M_AYlnhwmoYy4?e=370nGH"
     target="_blank"
     class="pdf-overlay-link"></a>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
  pdf.getPage(1).then(page => {
    const viewport = page.getViewport({scale:1.0});
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const context = canvas.getContext('2d');
    page.render({canvasContext: context, viewport: viewport});
  });
});
</script>

</body>
</html>
