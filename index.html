<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beslisboom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    body { margin: 0; }
    canvas { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>

<canvas id="pdf-canvas"></canvas>

<script>
const url = 'beslisboom.pdf'; // PDF moet in dezelfde folder als index.html

// PDF.js laden
const loadingTask = pdfjsLib.getDocument(url);
loadingTask.promise.then(pdf => {
  // Alleen eerste pagina tonen
  pdf.getPage(1).then(page => {
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.getElementById('pdf-canvas');
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    page.render({ canvasContext: context, viewport: viewport });
  });
}).catch(err => {
  console.error('PDF laden mislukt:', err);
  document.body.innerHTML = '<p>PDF kon niet geladen worden. Controleer bestandsnaam en locatie.</p>';
});
</script>

</body>
</html>
