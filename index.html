<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beslisboom Interactief</title>
  <script src="lib/pdf.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
  </script>
  <style>
    body { margin: 0; font-family: Arial; text-align: center; }

    .pdf-container {
      position: relative;
      width: 800px; /* vaste breedte */
      margin: 0 auto;
      height: auto; /* hoogte automatisch */
    }

    canvas {
      width: 800px;  /* exacte breedte */
      height: auto;  /* originele PDF aspect ratio behouden */
      display: block;
    }

    .btn-area {
      position: absolute;
      background: rgba(255,0,0,0.5); /* zichtbaar voor testen */
      cursor: move;
      z-index: 10;
      pointer-events: auto;
    }
  </style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>

  <!-- Klikbare gebieden -->
  <div id="btn-standaard" class="btn-area"></div>
  <div id="btn-niet-standaard" class="btn-area"></div>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');
const btnStandaard = document.getElementById('btn-standaard');
const btnNietStandaard = document.getElementById('btn-niet-standaard');

// Startwaarden voor testen (kun je slepen)
const origStandaard = {x: 200, y: 100, width: 100, height: 40};
const origNiet = {x: 420, y: 100, width: 100, height: 40};

// Plaats de knoppen exact op de pixels
function positionButtons() {
  btnStandaard.style.left = origStandaard.x + 'px';
  btnStandaard.style.top = origStandaard.y + 'px';
  btnStandaard.style.width = origStandaard.width + 'px';
  btnStandaard.style.height = origStandaard.height + 'px';

  btnNietStandaard.style.left = origNiet.x + 'px';
  btnNietStandaard.style.top = origNiet.y + 'px';
  btnNietStandaard.style.width = origNiet.width + 'px';
  btnNietStandaard.style.height = origNiet.height + 'px';
}

// Klikacties
btnStandaard.addEventListener('click', () => {
  window.open('https://example.com/standaard-change', '_blank');
});
btnNietStandaard.addEventListener('click', () => {
  window.open('https://example.com/niet-standaard-change', '_blank');
});

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
  pdf.getPage(1).then(page => {
    const viewport = page.getViewport({ scale: 1.0 });
    const context = canvas.getContext('2d');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
      positionButtons();
    });
  });
});

// Sleepbare helper voor de knoppen
function makeDraggable(el) {
  el.style.position = 'absolute';
  el.style.zIndex = 10;
  let offsetX, offsetY;

  el.onmousedown = function(e) {
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;

    document.onmousemove = function(e) {
      el.style.left = (e.clientX - offsetX) + 'px';
      el.style.top = (e.clientY - offsetY) + 'px';
    };

    document.onmouseup = function() {
      document.onmousemove = null;
      document.onmouseup = null;
      console.log(el.id, 'x:', el.offsetLeft, 'y:', el.offsetTop, 'width:', el.offsetWidth, 'height:', el.offsetHeight);
    };
    e.preventDefault();
  };
}

makeDraggable(btnStandaard);
makeDraggable(btnNietStandaard);
</script>

</body>
</html>
