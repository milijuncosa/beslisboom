<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beslisboom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.12.313/pdf.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; }
    #pdf-canvas { width: 100%; height: 100vh; display: block; }
  </style>
</head>
<body>

<canvas id="pdf-canvas"></canvas>

<script>
  // PDF-bestand moet in dezelfde folder als index.html
  const url = 'beslisboom.pdf';

  // PDF.js laden
  const loadingTask = pdfjsLib.getDocument(url);
  loadingTask.promise.then(pdf => {
    pdf.getPage(1).then(page => {
      const scale = 1.5;
      const viewport = page.getViewport({ scale: scale });
      const canvas = document.getElementById('pdf-canvas');
      const context = canvas.getContext('2d');
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      page.render({ canvasContext: context, viewport: viewport });
    });
  }).catch(error => {
    console.error('PDF laden mislukt:', error);
  });
</script>

</body>
</html>
