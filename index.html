<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beslisboom Interactief</title>
<script src="lib/pdf.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
</script>
<style>
body { margin:0; font-family:Arial, sans-serif; text-align:center; }

.pdf-container {
  position: relative;
  width: 100%;
  max-width: 800px;
  aspect-ratio: 4 / 5; /* 800x1000 verhouding vast */
  margin: 0 auto;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  z-index: 1;
  position: relative;
}

.btn-area {
  position: absolute;
  background: rgba(255,0,0,0.3); /* tijdelijk zichtbaar voor testen */
  cursor: pointer;
  z-index: 10;
  border: 1px solid blue; /* debug */
}
</style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>
  <div id="btn-standaard" class="btn-area"></div>
  <div id="btn-niet-standaard" class="btn-area"></div>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');
const container = document.querySelector('.pdf-container');
const btnStandaard = document.getElementById('btn-standaard');
const btnNietStandaard = document.getElementById('btn-niet-standaard');

// Originele pixelposities op 800x1000 canvas
const origStandaard = {x:200,y:100,width:100,height:40};
const origNiet = {x:420,y:100,width:100,height:40};

// Zet knoppen op basis van percentages t.o.v container
function positionButtons() {
  const cw = container.clientWidth;
  const ch = container.clientHeight;

  const btns = [
    {btn: btnStandaard, orig: origStandaard},
    {btn: btnNietStandaard, orig: origNiet}
  ];

  btns.forEach(o=>{
    o.btn.style.left = (o.orig.x/800*100) + '%';
    o.btn.style.top = (o.orig.y/1000*100) + '%';
    o.btn.style.width = (o.orig.width/800*100) + '%';
    o.btn.style.height = (o.orig.height/1000*100) + '%';
  });
}

// Klikacties
btnStandaard.addEventListener('click', ()=>window.open('https://example.com/standaard-change','_blank'));
btnNietStandaard.addEventListener('click', ()=>window.open('https://example.com/niet-standaard-change','_blank'));

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf=>{
  pdf.getPage(1).then(page=>{
    const viewport = page.getViewport({scale:1.0});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const context = canvas.getContext('2d');
    page.render({canvasContext:context, viewport:viewport}).promise.then(()=>{
      positionButtons(); // knoppen positioneren na render
    });
  });
});

// Herpositioneer bij resize
window.addEventListener('resize', positionButtons);
</script>

</body>
</html>
