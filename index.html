<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beslisboom Interactief</title>
<script src="lib/pdf.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
</script>
<style>
body { margin:0; font-family:Arial, sans-serif; text-align:center; }

.pdf-container {
  position: relative;
  width: 100%;
  max-width: 800px; /* optioneel */
  margin: 0 auto;
}

canvas {
  display: block;
  width: 100%;
  height: auto; /* behoudt verhoudingen */
}

.svg-overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:10;
}

.svg-overlay rect {
  fill: transparent; /* volledig onzichtbaar */
  cursor: pointer;
  pointer-events: all;
}
</style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>
  <svg class="svg-overlay" id="svg-overlay"></svg>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');
const svgOverlay = document.getElementById('svg-overlay');

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
  pdf.getPage(1).then(page => {
    const viewport = page.getViewport({scale:1.0});
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    const context = canvas.getContext('2d');
    page.render({canvasContext: context, viewport: viewport}).promise.then(() => {
      drawSVGButtons();
    });
  });
});

// Plaats de 2 transparante knoppen: linker- en rechterbovenkwart
function drawSVGButtons() {
  svgOverlay.innerHTML = '';

  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;

  // Linkerbovenkwart
  const rectLeft = document.createElementNS("http://www.w3.org/2000/svg","rect");
  rectLeft.setAttribute('x', 0);
  rectLeft.setAttribute('y', 0);
  rectLeft.setAttribute('width', cw/2);
  rectLeft.setAttribute('height', ch/2);
  rectLeft.addEventListener('click', ()=>window.open('https://example.com/standaard-change','_blank'));
  svgOverlay.appendChild(rectLeft);

  // Rechterbovenkwart
  const rectRight = document.createElementNS("http://www.w3.org/2000/svg","rect");
  rectRight.setAttribute('x', cw/2);
  rectRight.setAttribute('y', 0);
  rectRight.setAttribute('width', cw/2);
  rectRight.setAttribute('height', ch/2);
  rectRight.addEventListener('click', ()=>window.open('https://example.com/niet-standaard-change','_blank'));
  svgOverlay.appendChild(rectRight);
}

// Herpositioneer bij resize
window.addEventListener('resize', drawSVGButtons);

</script>

</body>
</html>
