<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beslisboom Interactief</title>
  <script src="lib/pdf.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
  </script>
  <style>
    body { margin: 0; font-family: Arial, text-align: center; }

    .pdf-container {
      position: relative;
      width: 100%;          /* fullscreen binnen iframe */
      max-width: 800px;     /* optionele max breedte */
      margin: 0 auto;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      position: relative;
      z-index: 1;
    }

    .btn-area {
      position: absolute;
      background: rgba(255,0,0,0.3); /* tijdelijk zichtbaar voor testen */
      cursor: pointer;
      z-index: 10;  /* boven het canvas */
      border: 2px solid blue; /* voor debug, kan later weg */
    }
  </style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>

  <!-- Klikbare gebieden -->
  <div id="btn-standaard" class="btn-area"></div>
  <div id="btn-niet-standaard" class="btn-area"></div>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';

const canvas = document.getElementById('pdf-canvas');
const container = document.querySelector('.pdf-container');
const btnStandaard = document.getElementById('btn-standaard');
const btnNietStandaard = document.getElementById('btn-niet-standaard');

// Originele pixelposities (op 800x1000 canvas)
const origStandaard = {x: 200, y: 100, width: 100, height: 40};
const origNiet = {x: 420, y: 100, width: 100, height: 40};

function positionButtons() {
  const containerWidth = container.clientWidth;
  const containerHeight = containerWidth / 800 * 1000; // verhouding 800x1000

  // Bereken positie in pixels binnen geschaalde container
  const scaleX = containerWidth / 800;
  const scaleY = containerHeight / 1000;

  [ {btn: btnStandaard, orig: origStandaard},
    {btn: btnNietStandaard, orig: origNiet} ].forEach(obj => {
      obj.btn.style.left = (obj.orig.x * scaleX) + 'px';
      obj.btn.style.top = (obj.orig.y * scaleY) + 'px';
      obj.btn.style.width = (obj.orig.width * scaleX) + 'px';
      obj.btn.style.height = (obj.orig.height * scaleY) + 'px';
  });
}

// Klikacties
btnStandaard.addEventListener('click', () => {
  window.open('https://example.com/standaard-change', '_blank');
});
btnNietStandaard.addEventListener('click', () => {
  window.open('https://example.com/niet-standaard-change', '_blank');
});

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
  pdf.getPage(1).then(page => {
    const viewport = page.getViewport({ scale: 1.0 }); // originele grootte
    const context = canvas.getContext('2d');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
      // Na render, pas container en knoppen aan
      container.style.height = (canvas.height / canvas.width * container.clientWidth) + 'px';
      positionButtons();
    });
  });
});

// Zorg dat bij window resize de knoppen correct blijven
window.addEventListener('resize', positionButtons);

</script>

</body>
</html>
