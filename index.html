<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beslisboom Interactief</title>
  <script src="lib/pdf.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
  </script>
  <style>
    body { margin: 0; font-family: Arial; }
    .pdf-container { position: relative; width: 80%; margin: 0 auto; }
    canvas { width: 100%; display: block; }

    .btn-area {
      position: absolute;
      background: rgba(255,0,0,0.3); /* tijdelijk zichtbaar voor testen */
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>

  <!-- Klikbare gebieden -->
  <div id="btn-standaard" class="btn-area"></div>
  <div id="btn-niet-standaard" class="btn-area"></div>
</div>

<script>
const pdfUrl = 'beslisboom.pdf'; // jouw PDF

const canvas = document.getElementById('pdf-canvas');
const btnStandaard = document.getElementById('btn-standaard');
const btnNietStandaard = document.getElementById('btn-niet-standaard');

// **Pixelwaarden zoals jij doorgegeven hebt**
const origStandaard = {x: 200, y: 100, width: 100, height: 40};
const origNiet = {x: 420, y: 100, width: 100, height: 40};

function positionButtons() {
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / canvas.width;
  const scaleY = rect.height / canvas.height;

  // Standaard Change knop
  btnStandaard.style.left = (origStandaard.x * scaleX) + 'px';
  btnStandaard.style.top = (origStandaard.y * scaleY) + 'px';
  btnStandaard.style.width = (origStandaard.width * scaleX) + 'px';
  btnStandaard.style.height = (origStandaard.height * scaleY) + 'px';

  // Niet-standaard Change knop
  btnNietStandaard.style.left = (origNiet.x * scaleX) + 'px';
  btnNietStandaard.style.top = (origNiet.y * scaleY) + 'px';
  btnNietStandaard.style.width = (origNiet.width * scaleX) + 'px';
  btnNietStandaard.style.height = (origNiet.height * scaleY) + 'px';
}

// Voeg klik-acties toe
btnStandaard.addEventListener('click', () => {
  window.open('https://example.com/standaard-change', '_blank');
});
btnNietStandaard.addEventListener('click', () => {
  window.open('https://example.com/niet-standaard-change', '_blank');
});

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
  pdf.getPage(1).then(page => {
    const viewport = page.getViewport({ scale: 1.5 });
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
      positionButtons(); // plaatsen na render
    });
  });
});

// Pas knoppen opnieuw aan bij schermresize
window.addEventListener('resize', positionButtons);
</script>

</body>
</html>
