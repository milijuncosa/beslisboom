<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beslisboom Interactief - Topdesk</title>
<script src="lib/pdf.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
</script>
<style>
body { margin:0; font-family:Arial, sans-serif; text-align:center; }

.pdf-container {
  position: relative;
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
}

canvas {
  display: block;
  width: 100%;
  height: auto; /* behoudt juiste verhouding */
}

.svg-overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:10;
  pointer-events: none;
}

.svg-overlay rect {
  fill: transparent; /* volledig onzichtbaar */
  cursor: pointer;
  pointer-events: all; /* rects klikbaar */
}
</style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>
  <svg class="svg-overlay" id="svg-overlay"></svg>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');
const svgOverlay = document.getElementById('svg-overlay');
const container = document.querySelector('.pdf-container');

// Twee knoppen: linker- en rechterbovenhoek (bovenste helft)
const buttons = [
  {x:0, y:0, width:50, height:50, url:'https://example.com/standaard-change'}, // linker boven
  {x:50, y:0, width:50, height:50, url:'https://example.com/niet-standaard-change'} // rechter boven
];

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf=>{
  pdf.getPage(1).then(page=>{
    const viewport = page.getViewport({scale:1.0});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.height = (canvas.height / canvas.width * 100) + 'vw'; // juiste verhouding in viewport
    const context = canvas.getContext('2d');
    page.render({canvasContext:context, viewport:viewport}).promise.then(()=>{
      drawSVGButtons();
    });
  });
});

// Plaats de knoppen in percentages over het canvas
function drawSVGButtons() {
  svgOverlay.innerHTML = '';
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;
  buttons.forEach(b=>{
    const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute('x', b.x + '%');
    rect.setAttribute('y', b.y + '%');
    rect.setAttribute('width', b.width + '%');
    rect.setAttribute('height', b.height + '%');
    rect.addEventListener('click', ()=>window.open(b.url,'_blank'));
    svgOverlay.appendChild(rect);
  });
}

// Herpositioneer bij resize
window.addEventListener('resize', drawSVGButtons);

</script>

</body>
</html>
