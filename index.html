<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beslisboom Interactief - Topdesk</title>
<script src="lib/pdf.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.js';
</script>
<style>
body { margin:0; font-family:Arial, sans-serif; text-align:center; }

.pdf-container {
  position: relative;
  width: 100%;
  max-width: 800px;
  aspect-ratio: 4/5; /* 800x1000 verhouding */
  margin: 0 auto;
  overflow: hidden;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  z-index: 1;
  position: relative;
}

.svg-overlay {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:10;
  pointer-events: none;
}

.svg-overlay rect {
  fill: transparent; /* volledig onzichtbaar */
  cursor: pointer;
  pointer-events: all;
}
</style>
</head>
<body>

<div class="pdf-container">
  <canvas id="pdf-canvas"></canvas>
  <svg class="svg-overlay" id="svg-overlay"></svg>
</div>

<script>
const pdfUrl = 'beslisboom.pdf';
const canvas = document.getElementById('pdf-canvas');
const svgOverlay = document.getElementById('svg-overlay');

// Twee knoppen: linker- en rechterbovenhoek
const buttons = [
  {
    x: '0%',   y: '0%', width: '50%', height: '10%',
    url: 'https://example.com/standaard-change'
  },
  {
    x: '50%',  y: '0%', width: '50%', height: '10%',
    url: 'https://example.com/niet-standaard-change'
  }
];

// Render PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf=>{
  pdf.getPage(1).then(page=>{
    const viewport = page.getViewport({scale:1.0});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const context = canvas.getContext('2d');
    page.render({canvasContext:context, viewport:viewport}).promise.then(()=>{
      drawSVGButtons();
    });
  });
});

// Plaats de SVG rects
function drawSVGButtons() {
  svgOverlay.innerHTML = '';
  buttons.forEach(b => {
    const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute('x', b.x);
    rect.setAttribute('y', b.y);
    rect.setAttribute('width', b.width);
    rect.setAttribute('height', b.height);
    rect.addEventListener('click', ()=>window.open(b.url,'_blank'));
    svgOverlay.appendChild(rect);
  });
}

// Bij resize opnieuw tekenen
window.addEventListener('resize', drawSVGButtons);

</script>

</body>
</html>
